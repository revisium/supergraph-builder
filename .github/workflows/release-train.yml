name: Release Train

on:
  workflow_dispatch:
    inputs:
      action:
        description: Release train transition
        required: true
        type: choice
        options:
          - start-minor-alpha
          - start-major-alpha
          - start-minor-rc
          - start-major-rc
          - start-minor-stable
          - start-major-stable
          - alpha-bump
          - promote-rc
          - rc-bump
          - stable
          - patch
          - patch-alpha-start
          - patch-rc-start
      dry_run:
        description: Validate and show the computed release without pushing.
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.repository }}-release-train
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  release-train:
    name: Release train
    uses: revisium/revisium-actions/.github/workflows/release-train.yml@184b609dcbc1e23f14021141f29226d4e6a0f1ac # v0.3.6
    with:
      action: ${{ inputs.action }}
      dry_run: ${{ inputs.dry_run }}
      base_branch: master
      node_version: 22.11.0
      install_command: |
        npm ci --ignore-scripts --prefer-offline --no-audit --no-fund
      validate_command: |
        cp .env.example .env
        npm run lint:ci
        npm run tsc
        npm run test:cov
        npm run build
    secrets:
      RELEASE_BOT_PRIVATE_KEY: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
